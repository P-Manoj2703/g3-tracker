<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G3 Builders — Log Expense</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="logo-mark">G3</a>
    <div>
      <div class="header-title">Log Expense</div>
      <div class="header-sub">G3 Builders — Field Entry</div>
    </div>
  </div>
  <div class="ref-badge" id="ref-display">REF-...</div>
</div>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="entry.html" class="active">Expense</a>
  <a href="vendors.html">Vendors</a>
  <a href="sales.html">Sales</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<div class="container-sm">

  <div class="section-label">Identity</div>
  <div class="field">
    <label>Submitted By <span class="required">*</span></label>
    <input type="text" id="submittedBy" placeholder="Your name" autocomplete="name">
  </div>

  <div class="section-label">Payment Details</div>
  <div class="field">
    <label>Amount (₹) <span class="required">*</span></label>
    <div class="amount-wrap">
      <span class="prefix">₹</span>
      <input type="number" id="amount" placeholder="0" inputmode="numeric" oninput="updateAmount()">
    </div>
    <div class="amount-preview" id="amount-preview"></div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Category <span class="required">*</span></label>
      <select id="category">
        <option value="">— select —</option>
      </select>
    </div>
    <div class="field">
      <label>Pay Mode <span class="required">*</span></label>
      <select id="paymode">
        <option value="">— select —</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Vendor / Supplier <span class="required">*</span></label>
    <select id="vendor">
      <option value="">— select or type below —</option>
    </select>
  </div>
  <div class="field">
    <input type="text" id="vendor-other" placeholder="Or type vendor name manually" style="margin-top:-8px;">
  </div>

  <div class="field">
    <label>Notes</label>
    <textarea id="notes" placeholder="Bill number, purpose, or 'No receipt — reason'"></textarea>
  </div>

  <div class="section-label">Location & Proof</div>
  <div class="field">
    <label>GPS Location</label>
    <div class="gps-row">
      <input type="text" id="gps" placeholder="Tap to capture" readonly>
      <button class="gps-btn" id="gps-btn" onclick="getGPS()">📍 Capture</button>
    </div>
  </div>

  <div class="field">
    <label>Photo / Bill</label>
    <div class="photo-area">
      <input type="file" id="photo" accept="image/*" capture="environment" onchange="photoSelected()">
      <div class="icon">📷</div>
      <p>Tap to photograph the bill</p>
      <div class="photo-name" id="photo-name"></div>
    </div>
    <div class="photo-preview" id="photo-preview">
      <img id="photo-preview-img" src="" alt="Preview">
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitEntry()">⬆ Submit Entry</button>

</div>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
  function genRef() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = String(d.getFullYear()).slice(-2);
    return 'EXP-' + dd + mm + yy + '-' + (Math.floor(Math.random()*900)+100);
  }

  let REF = genRef();
  document.getElementById('ref-display').textContent = REF;

  // Populate dropdowns from config
  const catSel = document.getElementById('category');
  CONFIG.categories.filter(c => c.type === 'expense' || c.roles === 'all').forEach(c => {
    catSel.innerHTML += '<option value="'+c.id+'">'+c.name+'</option>';
  });

  const paySel = document.getElementById('paymode');
  CONFIG.paymodes.forEach(p => { paySel.innerHTML += '<option>'+p+'</option>'; });

  const venSel = document.getElementById('vendor');
  CONFIG.vendors.forEach(v => { venSel.innerHTML += '<option value="'+v.id+'">'+v.name+'</option>'; });

  function updateAmount() {
    const val = parseInt(document.getElementById('amount').value) || 0;
    const el = document.getElementById('amount-preview');
    if (!val) { el.textContent = ''; el.className = 'amount-preview'; return; }
    el.textContent = CONFIG.fmt(val) + (val >= CONFIG.largeAmountAlert ? ' — WhatsApp alert will be sent' : '');
    el.className = 'amount-preview' + (val >= CONFIG.largeAmountAlert ? ' large' : '');
  }

  function getGPS() {
    const btn = document.getElementById('gps-btn');
    btn.textContent = '⏳ Getting...'; btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('gps').value = pos.coords.latitude.toFixed(6) + ',' + pos.coords.longitude.toFixed(6);
        btn.textContent = '✓ Got it'; btn.className = 'gps-btn got'; btn.disabled = false;
      },
      () => { btn.textContent = '📍 Capture'; btn.disabled = false; showToast('Location denied', 'error'); }
    );
  }

  function photoSelected() {
    const file = document.getElementById('photo').files[0];
    if (!file) return;
    document.getElementById('photo-name').textContent = '✓ ' + file.name;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('photo-preview-img').src = e.target.result;
      document.getElementById('photo-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (type||'');
    setTimeout(() => t.className = 'toast', 3500);
  }

  async function submitEntry() {
    const vendorSel = document.getElementById('vendor').value;
    const vendorOther = document.getElementById('vendor-other').value.trim();
    const vendorName = vendorOther || (vendorSel ? CONFIG.vendors.find(v=>v.id===vendorSel)?.name || vendorSel : '');

    const fields = {
      submittedBy: document.getElementById('submittedBy').value.trim(),
      amount: document.getElementById('amount').value.trim(),
      category: document.getElementById('category').value,
      paymode: document.getElementById('paymode').value,
      vendor: vendorName,
    };

    for (const [k,v] of Object.entries(fields)) {
      if (!v) { showToast('Please fill all required fields', 'error'); return; }
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '⏳ Submitting...';

    let photoData = '', photoMime = '', photoName = '';
    const photoFile = document.getElementById('photo').files[0];
    if (photoFile) {
      btn.textContent = '⏳ Reading photo...';
      photoData = await new Promise((res,rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(photoFile);
      });
      photoMime = photoFile.type;
      photoName = photoFile.name;
    }

    btn.textContent = '⏳ Saving...';
    const catName = CONFIG.categories.find(c=>c.id===fields.category)?.name || fields.category;

    const params = new URLSearchParams({
      type: 'expense', ref: REF,
      timestamp: new Date().toISOString(),
      submittedBy: fields.submittedBy,
      category: catName,
      amount: fields.amount,
      paymode: fields.paymode,
      vendor: fields.vendor,
      notes: document.getElementById('notes').value.trim(),
      gps: document.getElementById('gps').value,
      photoData, photoMime, photoName,
    });

    try {
      await fetch(CONFIG.sheetURL, { method: 'POST', body: params });
      showToast('✓ Entry saved — ' + REF, 'success');
      setTimeout(() => {
        document.querySelectorAll('input:not([type=file]), select, textarea').forEach(el => el.value = '');
        document.getElementById('photo-name').textContent = '';
        document.getElementById('photo-preview').style.display = 'none';
        document.getElementById('amount-preview').textContent = '';
        document.getElementById('gps-btn').textContent = '📍 Capture';
        document.getElementById('gps-btn').className = 'gps-btn';
        REF = genRef();
        document.getElementById('ref-display').textContent = REF;
        btn.disabled = false; btn.textContent = '⬆ Submit Entry';
      }, 1800);
    } catch(err) {
      showToast('Failed — check connection', 'error');
      btn.disabled = false; btn.textContent = '⬆ Submit Entry';
    }
  }
</script>
</body>
</html>
